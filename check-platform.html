<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkBuddy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стилі залишаються без змін */
    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <h2 id="username">WorkBuddy</h2>
        </div>
        <div class="status-box">
            <div class="status" id="statusText">
                ⚪ Ви ще не на роботі
            </div>
            <div class="last-action" id="lastAction">
                Остання дія: —
            </div>
        </div>
        <div class="menu">
            <div class="card" id="btn_work_start">
                <div class="icon">🏢</div>
                <div class="text">
                    <div class="title">Прихід на роботу</div>
                    <div class="subtitle">Початок робочого дня</div>
                </div>
            </div>
            <div class="card" id="btn_coffee_start" style="pointer-events: none; opacity: 0.5;">
                <div class="icon">☕</div>
                <div class="text">
                    <div class="title">Кава брейк</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>
            <div class="card" id="btn_coffee_end">
                <div class="icon">✅</div>
                <div class="text">
                    <div class="title">Кінець кави</div>
                    <div class="subtitle">Завершення</div>
                </div>
            </div>
            <div class="card" id="btn_lunch_start" style="pointer-events: none; opacity: 0.5;">
                <div class="icon">🍽</div>
                <div class="text">
                    <div class="title">Обід</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>
            <div class="card" id="btn_lunch_end">
                <div class="icon">✅</div>
                <div class="text">
                    <div class="title">Кінець обіду</div>
                    <div class="subtitle">Завершення</div>
                </div>
            </div>
            <div class="card" id="btn_work_end">
                <div class="icon">🏠</div>
                <div class="text">
                    <div class="title">Вихід з офісу</div>
                    <div class="subtitle">Завершення робочого дня</div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="success" id="successBox">
    ✅ Збережено
</div>

<script>
    /* BLOCK MOBILE */
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.body.innerHTML = `
        <div style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;font-family:sans-serif">
        <div>
        🤖<br><br>
        А шлях би його трапив!<br>
        Схоже, моє меню на телефоні не працює.<br>
        Краще відкрий мене з комп'ютера 💻
        </div>
        </div>
        `;
        throw new Error("Mobile blocked")
    }

    /* TELEGRAM */
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe.user;
    if (user) {
        document.getElementById("username").textContent = user.first_name;
    }

    /* BUTTON EVENTS */
    document.getElementById("btn_work_start").addEventListener("click", () => action("work_start"));
    document.getElementById("btn_coffee_start").addEventListener("click", () => action("coffee_start"));
    document.getElementById("btn_coffee_end").addEventListener("click", () => action("coffee_end"));
    document.getElementById("btn_lunch_start").addEventListener("click", () => action("lunch_start"));
    document.getElementById("btn_lunch_end").addEventListener("click", () => action("lunch_end"));
    document.getElementById("btn_work_end").addEventListener("click", () => action("work_end"));

    /* ACTION */
    function action(type) {
        const now = new Date();
        const hour = now.getHours();
        const minutes = now.getMinutes();

        const current = hour * 60 + minutes;
        const morningStart = 10 * 60;
        const morningEnd = 11 * 60;

        const eveningStart = 17 * 60;
        const eveningEnd = 19 * 60;

        const time = hour + ":" + (minutes < 10 ? "0" + minutes : minutes); // Форматуємо час як "години:хвилини"
        const actions = {
            work_start: "Прихід на роботу",
            coffee_start: "Початок кави",
            coffee_end: "Кінець кави",
            lunch_start: "Початок обіду",
            lunch_end: "Кінець обіду",
            work_end: "Вихід з офісу"
        };

        const statuses = {
            work_start: "🟢 Ви на роботі",
            coffee_start: "☕ Ви на каві",
            coffee_end: "🟢 Ви на роботі", // Зміна статусу з кави на роботу
            lunch_start: "🍽 Ви на обіді",
            lunch_end: "🟢 Ви на роботі", // Зміна статусу з обіду на роботу
            work_end: "🔴 Робочий день завершено"
        };

        const lastWorkStart = localStorage.getItem("lastWorkStart");
        const lastWorkEnd = localStorage.getItem("lastWorkEnd");
        const coffeeUsed = parseInt(localStorage.getItem("coffeeUsed") || "0");
        const lunchUsed = parseInt(localStorage.getItem("lunchUsed") || "0");

        // Перевірка для кнопки "Прихід на роботу" (можна натискати лише один раз на добу)
        if (type === "work_start") {
            if (lastWorkStart && (new Date() - new Date(lastWorkStart)) < 24 * 60 * 60 * 1000) {
                tg.showPopup({
                    title: "⛔ Помилка",
                    message: "Ви вже прийшли на роботу сьогодні.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        // Перевірка для кнопок "Кава" та "Обід" до натискання "Прихід на роботу"
        if (lastWorkStart === null || (new Date() - new Date(lastWorkStart)) < 24 * 60 * 60 * 1000) {
            tg.showPopup({
                title: "⛔ Помилка",
                message: "Ви повинні спочатку прийти на роботу.",
                buttons: [{ type: "ok" }]
            });
            return;
        }

        // Перевірка для кнопки "Вихід з офісу" (можна натискати лише один раз на добу)
        if (type === "work_end") {
            if (lastWorkEnd && (new Date() - new Date(lastWorkEnd)) < 24 * 60 * 60 * 1000) {
                tg.showPopup({
                    title: "⛔ Помилка",
                    message: "Ви вже вийшли з офісу сьогодні.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        // Перевірка для кави
        if (type === "coffee_start") {
            if (coffeeUsed >= 45) {  // Якщо вже використано більше 45 хвилин на каву
                tg.showPopup({
                    title: "⛔ Час на каву використано",
                    message: "Ви вже використали час на каву на сьогодні.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        // Перевірка для обіду
        if (type === "lunch_start") {
            if (lunchUsed >= 60) {  // Якщо вже використано більше 60 хвилин на обід
                tg.showPopup({
                    title: "⛔ Час на обід використано",
                    message: "Ви вже використали час на обід на сьогодні.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        // Оновлення статусу
        document.getElementById("statusText").textContent = statuses[type];
        document.getElementById("lastAction").textContent = "Остання дія: " + actions[type] + " " + time;

        tg.HapticFeedback.impactOccurred("medium");
        tg.sendData(JSON.stringify({
            action: type,
            time: new Date().toISOString()
        }));

        showSuccess();

        // Зберігаємо статуси в localStorage
        if (type === "work_start") {
            localStorage.setItem("lastWorkStart", new Date().toISOString());
            document.getElementById("btn_coffee_start").style.pointerEvents = "auto"; // Активуємо кнопки кави та обіду
            document.getElementById("btn_coffee_start").style.opacity = 1;
            document.getElementById("btn_lunch_start").style.pointerEvents = "auto";
            document.getElementById("btn_lunch_start").style.opacity = 1;
        }

        if (type === "work_end") {
            localStorage.setItem("lastWorkEnd", new Date().toISOString());
        }

        // Оновлюємо лічильник кави та обіду
        if (type === "coffee_start") {
            localStorage.setItem("coffeeUsed", coffeeUsed + 15);  // додаємо 15 хвилин до кави
        }

        if (type === "lunch_start") {
            localStorage.setItem("lunchUsed", lunchUsed + 60);  // додаємо 60 хвилин до обіду
        }
    }

    /* SUCCESS */
    function showSuccess() {
        const box = document.getElementById("successBox");
        box.classList.add("show");
        setTimeout(() => {
            box.classList.remove("show");
        }, 1200);
    }
</script>
</body>
</html>
