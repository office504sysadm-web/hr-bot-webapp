<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WorkBuddy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Roboto;
background:linear-gradient(180deg,#6a7cff,#7b61ff,#8c6cff);
color:white;
display:flex;
justify-content:center;
margin:0;
}

.container{
max-width:420px;
width:100%;
padding:18px;
}

.header{
text-align:center;
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:white;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:#333;
}

.status-box{
background:rgba(255,255,255,.2);
border-radius:16px;
padding:12px;
margin:12px 0;
text-align:center;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.card{
background:white;
border-radius:18px;
padding:10px 14px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
}

.title{
color:black;
font-weight:600;
}

.subtitle{
color:#666;
font-size:12px;
}

.icon{
font-size:20px;
}

.success{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:black;
padding:18px;
border-radius:14px;
transition:.3s;
}

.success.show{
transform:translate(-50%,-50%) scale(1);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="avatar">🤖</div>

<h2 id="username">WorkBuddy</h2>

</div>

<div class="status-box">

<div id="statusText">
⚪ Ви ще не на роботі
</div>

<div id="lastAction">
Остання дія: —
</div>

</div>

<div class="menu">

<div class="card" id="work_start">
<div class="icon">🏢</div>
<div>
<div class="title">Прихід на роботу</div>
<div class="subtitle">Початок робочого дня</div>
</div>
</div>

<div class="card" id="coffee_start">
<div class="icon">☕</div>
<div>
<div class="title">Кава брейк</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" id="coffee_end">
<div class="icon">✅</div>
<div>
<div class="title">Кінець кави</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" id="lunch_start">
<div class="icon">🍽</div>
<div>
<div class="title">Обід</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" id="lunch_end">
<div class="icon">✅</div>
<div>
<div class="title">Кінець обіду</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" id="work_end">
<div class="icon">🏠</div>
<div>
<div class="title">Вихід з офісу</div>
<div class="subtitle">Завершення дня</div>
</div>
</div>

</div>

</div>

<div class="success" id="successBox">
✅ Збережено
</div>

<script>

const tg = window.Telegram.WebApp

tg.ready()
tg.expand()

const user = tg.initDataUnsafe.user

if(user){
document.getElementById("username").innerHTML=user.first_name
}

const actions={
work_start:"Прихід на роботу",
coffee_start:"Початок кави",
coffee_end:"Кінець кави",
lunch_start:"Початок обіду",
lunch_end:"Кінець обіду",
work_end:"Вихід з офісу"
}

const statuses={
work_start:"🟢 Ви на роботі",
coffee_start:"☕ Ви на каві",
coffee_end:"🟢 Ви на роботі",
lunch_start:"🍽 Ви на обіді",
lunch_end:"🟢 Ви на роботі",
work_end:"🔴 Робочий день завершено"
}

function action(type){

const now=new Date()

const hour=now.getHours()
const minutes=now.getMinutes()

const current=hour*60+minutes

if(type==="coffee_start"||type==="lunch_start"){

if(
(current>=600&&current<660)||
(current>=1020&&current<1140)
){

tg.showPopup({
title:"⛔ Перерва недоступна",
message:"З 10:00 до 11:00 та з 17:00 до 19:00 перерви заборонені.",
buttons:[{type:"ok"}]
})

return

}

}

const time=now.toLocaleTimeString()

document.getElementById("statusText").innerHTML=statuses[type]

document.getElementById("lastAction").innerHTML=
"Остання дія: "+actions[type]+" ("+time+")"

tg.sendData(JSON.stringify({
action:type,
time:new Date().toISOString()
}))

showSuccess()

}

function showSuccess(){

const box=document.getElementById("successBox")

box.classList.add("show")

setTimeout(()=>{
box.classList.remove("show")
},1200)

}

/* BUTTON EVENTS */

document.getElementById("work_start").onclick=()=>action("work_start")
document.getElementById("coffee_start").onclick=()=>action("coffee_start")
document.getElementById("coffee_end").onclick=()=>action("coffee_end")
document.getElementById("lunch_start").onclick=()=>action("lunch_start")
document.getElementById("lunch_end").onclick=()=>action("lunch_end")
document.getElementById("work_end").onclick=()=>action("work_end")

</script>

</body>
</html>
