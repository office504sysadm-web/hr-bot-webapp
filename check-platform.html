<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перевірка пристрою</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
        }
        button {
            background: white;
            color: #2196F3;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 ПЕРЕВІРКА ПРИСТРОЮ</h1>
        <p id="status">Визначаємо платформу...</p>
        <button onclick="sendData()" style="display: none;">Надіслати дані</button>
    </div>

    <script>
        function sendData() {
            try {
                const tg = window.Telegram.WebApp;
                const platform = tg.platform;
                const isMobile = platform.includes('android') || platform.includes('ios');
                
                const data = {
                    platform: platform,
                    isMobile: isMobile,
                    timestamp: new Date().toISOString()
                };
                
                console.log('Sending:', data);
                tg.sendData(JSON.stringify(data));
                
                document.getElementById('status').innerHTML = '✅ Дані відправлено!';
                
                setTimeout(() => tg.close(), 1000);
                
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ Помилка: ' + e.message;
            }
        }

        // Автоматично відправляємо дані при завантаженні
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            sendData();
        } else {
            document.getElementById('status').innerHTML = '❌ Не в Telegram';
        }
    </script>
</body>
</html>
