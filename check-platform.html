<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkBuddy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto;
            background: linear-gradient(180deg, #6a7cff, #7b61ff, #8c6cff);
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 18px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: white;
            margin: auto;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #333;
        }

        h2 {
            font-size: 22px;
            margin-top: 4px;
        }

        /* STATUS */
        .status-box {
            background: rgba(255, 255, 255, .2);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
        }

        .status {
            font-size: 16px;
            font-weight: 600;
        }

        .last-action {
            font-size: 12px;
            opacity: .8;
        }

        /* MENU */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: .15s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
        }

        .card:active {
            transform: scale(.96);
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .text {
            flex: 1;
        }

        .title {
            color: #1c1c1e;
            font-weight: 600;
            font-size: 14px;
        }

        .subtitle {
            color: #6e6e73;
            font-size: 11px;
        }

        /* SUCCESS */
        .success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 20px 25px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .3);
            transition: .3s;
        }

        .success.show {
            transform: translate(-50%, -50%) scale(1);
        }

    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <h2 id="username">WorkBuddy</h2>
        </div>
        <div class="status-box">
            <div class="status" id="statusText">
                ⚪ Ви ще не на роботі
            </div>
            <div class="last-action" id="lastAction">
                Остання дія: —
            </div>
        </div>
        <div class="menu">
            <div class="card" id="btn_work_start">
                <div class="icon">🏢</div>
                <div class="text">
                    <div class="title">Прихід на роботу</div>
                    <div class="subtitle">Початок робочого дня</div>
                </div>
            </div>
            <div class="card" id="btn_online_start">
                <div class="icon">💻</div>
                <div class="text">
                    <div class="title">Працюю онлайн</div>
                    <div class="subtitle">Початок робочого дня</div>
                </div>
            </div>
            <div class="card" id="btn_coffee_start">
                <div class="icon">☕</div>
                <div class="text">
                    <div class="title">Кава брейк</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>
            <div class="card" id="btn_lunch_start">
                <div class="icon">🍽</div>
                <div class="text">
                    <div class="title">Обід</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>
            <div class="card" id="btn_work_end">
                <div class="icon">🏠</div>
                <div class="text">
                    <div class="title">Вихід з офісу</div>
                    <div class="subtitle">Завершення робочого дня</div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="success" id="successBox">
    ✅ Збережено
</div>

<script>
    /* BLOCK MOBILE */
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.body.innerHTML = ` 
        <div style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;font-family:sans-serif">
        <div>
        🤖<br><br>
        А шлях би його трапив!<br>
        Схоже, моє меню на телефоні не працює.<br>
        Краще відкрий мене з комп'ютера 💻
        </div>
        </div>
        `;
        throw new Error("Mobile blocked")
    }

    /* TELEGRAM */
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe.user;
    if (user) {
        document.getElementById("username").textContent = user.first_name;
    }

    // Ініціалізація змінних
    let coffeeUsed = parseInt(localStorage.getItem("coffeeUsed") || "0");
    let lunchUsed = parseInt(localStorage.getItem("lunchUsed") || "0");
    let userStatus = localStorage.getItem("userStatus") || "not_work"; // Початковий статус
    let statusTime = localStorage.getItem("statusTime");
    let lastAction = localStorage.getItem("lastAction");
    let lastActionTime = localStorage.getItem("lastActionTime");

    /* BUTTON EVENTS */
    document.getElementById("btn_work_start").addEventListener("click", () => action("work_start"));
    document.getElementById("btn_online_start").addEventListener("click", () => action("online_start"));
    document.getElementById("btn_coffee_start").addEventListener("click", () => action("coffee_start"));
    document.getElementById("btn_lunch_start").addEventListener("click", () => action("lunch_start"));
    document.getElementById("btn_work_end").addEventListener("click", () => action("work_end"));

    /* ACTION */
    function action(type) {
        const now = new Date();
        const hour = now.getHours();
        const minutes = now.getMinutes();
        const current = hour * 60 + minutes;
        const morningStart = 10 * 60;
        const morningEnd = 11 * 60;
        const eveningStart = 17 * 60;
        const eveningEnd = 19 * 60;

        // Прихід на роботу / Працюю онлайн
        if (type === "work_start" || type === "online_start") {
            if (userStatus !== "not_work" && current - statusTime < 1320) {
                tg.showPopup({
                    title: "⛔ Не можна повторно вийти на роботу",
                    message: "Ви можете натискати кнопку лише через 22 години після попереднього використання.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        if (type === "coffee_start" || type === "lunch_start") {
            if (
                (current >= morningStart && current < morningEnd) ||
                (current >= eveningStart && current < eveningEnd)
            ) {
                tg.showPopup({
                    title: "⛔ Перерва недоступна",
                    message: "З 10:00 до 11:00 та з 17:00 до 19:00 перерви заборонені.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }

            if (type === "coffee_start" && coffeeUsed >= 45) {
                tg.showPopup({
                    title: "⛔ Ліміт на каву вичерпано",
                    message: "Ви вже використали час на Кава брейк (45 хв).",
                    buttons: [{ type: "ok" }]
                });
                return;
            }

            if (type === "lunch_start" && lunchUsed >= 60) {
                tg.showPopup({
                    title: "⛔ Ліміт на обід вичерпано",
                    message: "Ви вже використали час на Обід (60 хв).",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
        }

        const time = hour + ":" + (minutes < 10 ? "0" + minutes : minutes);
        const actions = {
            work_start: "Прихід на роботу",
            online_start: "Працюю онлайн",
            coffee_start: "Початок кави",
            lunch_start: "Початок обіду",
            work_end: "Вихід з офісу"
        };

        const statuses = {
            work_start: "🟢 Ви на роботі",
            online_start: "🟢 Ви працюєте онлайн",
            coffee_start: "☕ Ви на каві",
            lunch_start: "🍽 Ви на обіді",
            work_end: "🔴 Робочий день завершено"
        };

        if (type === "coffee_start") {
            coffeeUsed += 15;
        }

        if (type === "lunch_start") {
            lunchUsed += 60;
        }

        /* UPDATE STATUS */
        document.getElementById("statusText").textContent = statuses[type];
        document.getElementById("lastAction").textContent =
            "Остання дія: " + actions[type] + " " + time;

        tg.HapticFeedback.impactOccurred("medium");
        tg.sendData(JSON.stringify({
            action: type,
            time: new Date().toISOString()
        }));

        showSuccess();

        // Зберігаємо статус та інформацію в localStorage
        localStorage.setItem("userStatus", type);
        localStorage.setItem("statusTime", current);
        localStorage.setItem("lastAction", actions[type]);
        localStorage.setItem("lastActionTime", time);
        localStorage.setItem("coffeeUsed", coffeeUsed);
        localStorage.setItem("lunchUsed", lunchUsed);
    }

    /* SUCCESS */
    function showSuccess() {
        const box = document.getElementById("successBox");
        box.classList.add("show");
        setTimeout(() => {
            box.classList.remove("show");
        }, 1200);
    }

    // Відновлення статусу при відкритті меню
    window.onload = () => {
        const savedStatus = localStorage.getItem("userStatus");
        const savedTime = localStorage.getItem("statusTime");
        const lastAction = localStorage.getItem("lastAction");
        const lastActionTime = localStorage.getItem("lastActionTime");

        coffeeUsed = parseInt(localStorage.getItem("coffeeUsed") || "0");
        lunchUsed = parseInt(localStorage.getItem("lunchUsed") || "0");

        if (savedStatus) {
            updateStatus(savedStatus, savedTime);
        }

        if (lastAction) {
            document.getElementById("lastAction").textContent = "Остання дія: " + lastAction + " о " + lastActionTime;
        }
    };

    function updateStatus(action, time) {
        const statusText = document.getElementById("statusText");

        if (action === "work_start") {
            statusText.innerText = "🟢 Ви на роботі";
        }

        if (action === "online_start") {
            statusText.innerText = "🟢 Ви працюєте онлайн"; 
        }

        if (action === "coffee_start") {
            statusText.innerText = "☕ Ви на каві";
        }

        if (action === "lunch_start") {
            statusText.innerText = "🍽 Ви на обіді";
        }

        if (action === "work_end") {
            statusText.innerText = "🔴 Ви не на роботі";
        }
    }
</script>
</body>
</html>
