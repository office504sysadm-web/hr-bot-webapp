<script>
    try {
        console.log("=== WebApp Started ===");
        const tg = window.Telegram.WebApp;
        console.log("Telegram WebApp API:", tg);
        
        tg.expand();
        console.log("WebApp expanded");
        
        const platform = tg.platform;
        console.log("Platform:", platform);
        
        const isMobile = platform.includes('android') || platform.includes('ios');
        console.log("Is Mobile:", isMobile);
        
        const userAgent = navigator.userAgent;
        console.log("User Agent:", userAgent);
        
        let os = 'unknown';
        if (userAgent.includes('Windows')) os = 'Windows';
        else if (userAgent.includes('Mac')) os = 'macOS';
        else if (userAgent.includes('Linux')) os = 'Linux';
        else if (userAgent.includes('Android')) os = 'Android';
        else if (userAgent.includes('iPhone') || userAgent.includes('iPad')) os = 'iOS';
        
        const deviceInfo = {
            platform: platform,
            isMobile: isMobile,
            os: os,
            userAgent: userAgent,
            timestamp: new Date().toISOString()
        };
        
        console.log("Device Info:", deviceInfo);
        console.log("Sending data to bot...");
        
        // Відправляємо дані боту
        tg.sendData(JSON.stringify(deviceInfo));
        console.log("Data sent successfully!");
        
        document.querySelector('h1').innerHTML = '✅ Перевірка завершена';
        document.querySelector('p').innerHTML = 'Дані відправлено боту. Ви можете закрити це вікно.';
        document.querySelector('.loader').style.display = 'none';
        
        setTimeout(() => {
            console.log("Closing WebApp");
            tg.close();
        }, 2000);
        
    } catch (error) {
        console.error("!!! WebApp Error !!!", error);
        document.querySelector('h1').innerHTML = '❌ Помилка';
        document.querySelector('p').innerHTML = 'Помилка: ' + error.message;
        document.querySelector('.loader').style.display = 'none';
        
        try {
            const tg = window.Telegram.WebApp;
            tg.sendData(JSON.stringify({
                error: error.message,
                userAgent: navigator.userAgent
            }));
        } catch (e) {
            console.error("Could not send error data:", e);
        }
    }
</script>
