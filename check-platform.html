<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка пристрою</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin: 0 0 20px;
            font-size: 24px;
        }
        p {
            margin: 10px 0;
            opacity: 0.9;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Перевірка пристрою</h1>
        <div class="loader"></div>
        <p>Визначаємо вашу платформу...</p>
    </div>

    <script>
        try {
            // Отримуємо доступ до Telegram WebApp API
            const tg = window.Telegram.WebApp;
            
            // Розгортаємо на весь екран
            tg.expand();
            
            // Визначаємо платформу через Telegram API
            const platform = tg.platform; // 'android', 'ios', 'macos', 'windows', 'linux'
            
            // Визначаємо чи це мобільний пристрій
            const isMobile = platform.includes('android') || platform.includes('ios');
            
            // Отримуємо додаткову інформацію через userAgent
            const userAgent = navigator.userAgent;
            
            // Детектимо конкретний браузер/ОС
            let os = 'unknown';
            let browser = 'unknown';
            
            if (userAgent.includes('Windows')) os = 'Windows';
            else if (userAgent.includes('Mac')) os = 'macOS';
            else if (userAgent.includes('Linux')) os = 'Linux';
            else if (userAgent.includes('Android')) os = 'Android';
            else if (userAgent.includes('iPhone') || userAgent.includes('iPad')) os = 'iOS';
            
            if (userAgent.includes('Chrome')) browser = 'Chrome';
            else if (userAgent.includes('Firefox')) browser = 'Firefox';
            else if (userAgent.includes('Safari')) browser = 'Safari';
            else if (userAgent.includes('Edge')) browser = 'Edge';
            
            // Формуємо дані для відправки
            const deviceInfo = {
                platform: platform,
                isMobile: isMobile,
                os: os,
                browser: browser,
                userAgent: userAgent,
                timestamp: new Date().toISOString()
            };
            
            // Відправляємо дані боту
            tg.sendData(JSON.stringify(deviceInfo));
            
            // Змінюємо повідомлення на успішне
            document.querySelector('h1').innerHTML = '✅ Перевірка завершена';
            document.querySelector('p').innerHTML = 'Дані відправлено боту. Ви можете закрити це вікно.';
            document.querySelector('.loader').style.display = 'none';
            
            // Автоматично закриваємо через 2 секунди
            setTimeout(() => {
                tg.close();
            }, 2000);
            
        } catch (error) {
            // Помилка
            document.querySelector('h1').innerHTML = '❌ Помилка';
            document.querySelector('p').innerHTML = 'Не вдалося визначити пристрій. Спробуйте ще раз.';
            document.querySelector('.loader').style.display = 'none';
            
            console.error('WebApp Error:', error);
            
            // Все одно відправляємо дані, якщо можемо
            try {
                const tg = window.Telegram.WebApp;
                tg.sendData(JSON.stringify({
                    error: error.message,
                    userAgent: navigator.userAgent
                }));
            } catch {}
        }
    </script>
</body>
</html>
