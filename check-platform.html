<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HR Bot Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .menu-container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .menu-btn {
            width: 100%;
            padding: 18px;
            margin: 8px 0;
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn:hover {
            background: #f0f0f0;
            transform: scale(0.99);
        }
        .menu-btn:active {
            background: #e0e0e0;
        }
        .icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .text {
            flex: 1;
            text-align: left;
        }
        .title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .subtitle {
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>☕ HR Bot</h1>
        
        <button class="menu-btn" onclick="sendAction('work_start')">
            <span class="icon" style="background: #e3f2fd; color: #1976d2;">🏢</span>
            <span class="text">
                <span class="title">Прихід на роботу</span><br>
                <span class="subtitle">Початок робочого дня</span>
            </span>
        </button>
        
        <button class="menu-btn" onclick="sendAction('coffee_start')">
            <span class="icon" style="background: #fff3e0; color: #f57c00;">☕</span>
            <span class="text">
                <span class="title">Кава брейк</span><br>
                <span class="subtitle">Початок</span>
            </span>
        </button>
        
        <button class="menu-btn" onclick="sendAction('coffee_end')">
            <span class="icon" style="background: #fce4ec; color: #c2185b;">✅</span>
            <span class="text">
                <span class="title">Кінець кави</span><br>
                <span class="subtitle">Завершення</span>
            </span>
        </button>
        
        <button class="menu-btn" onclick="sendAction('lunch_start')">
            <span class="icon" style="background: #e8f5e8; color: #388e3c;">🍽</span>
            <span class="text">
                <span class="title">Обід</span><br>
                <span class="subtitle">Початок</span>
            </span>
        </button>
        
        <button class="menu-btn" onclick="sendAction('lunch_end')">
            <span class="icon" style="background: #fce4ec; color: #c2185b;">✅</span>
            <span class="text">
                <span class="title">Кінець обіду</span><br>
                <span class="subtitle">Завершення</span>
            </span>
        </button>
        
        <button class="menu-btn" onclick="sendAction('work_end')">
            <span class="icon" style="background: #e3f2fd; color: #1976d2;">🏠</span>
            <span class="text">
                <span class="title">Відхід з офісу</span><br>
                <span class="subtitle">Завершення робочого дня</span>
            </span>
        </button>
    </div>

    <script>
        // Ініціалізація Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо на весь екран
        tg.ready();  // Готовність
        
        console.log('Telegram WebApp ініціалізовано');
        
        // Функція відправки даних
        function sendAction(action) {
            const data = {
                action: action,
                timestamp: new Date().toISOString(),
                platform: tg.platform
            };
            
            console.log('Відправляємо:', data);
            
            // ВІДПРАВКА В БОТА
            tg.sendData(JSON.stringify(data));
            
            // Візуальне підтвердження
            alert(`✅ Дія ${action} відправлена в бота!`);
        }
        
        // Перевірка чи WebApp доступний
        if (!tg) {
            alert('Помилка: Telegram WebApp не доступний');
        }
    </script>
</body>
</html>
