<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WorkBuddy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto;
            background: linear-gradient(180deg, #6a7cff, #7b61ff, #8c6cff);
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 18px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: white;
            margin: auto;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #333;
        }

        h2 {
            font-size: 22px;
            margin-top: 4px;
        }

        /* STATUS */
        .status-box {
            background: rgba(255, 255, 255, .2);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
        }

        .status {
            font-size: 16px;
            font-weight: 600;
        }

        .last-action {
            font-size: 12px;
            opacity: .8;
        }

        /* MENU */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: .15s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
        }

        .card:active {
            transform: scale(.96);
        }

        .card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .text {
            flex: 1;
        }

        .title {
            color: #1c1c1e;
            font-weight: 600;
            font-size: 14px;
        }

        .subtitle {
            color: #6e6e73;
            font-size: 11px;
        }

        /* SUCCESS */
        .success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 20px 25px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .3);
            transition: .3s;
            z-index: 1000;
        }

        .success.show {
            transform: translate(-50%, -50%) scale(1);
        }

    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <h2 id="username">WorkBuddy</h2>
        </div>
        <div class="status-box">
            <div class="status" id="statusText">
                ⚪ Ви ще не на роботі
            </div>
            <div class="last-action" id="lastAction">
                Остання дія: —
            </div>
        </div>
        <div class="menu" id="menuContainer">
            <!-- Кнопки будуть додаватися динамічно через JavaScript -->
        </div>
    </div>
</div>
<div class="success" id="successBox">
    ✅ Збережено
</div>

<script>
    /* BLOCK MOBILE */
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.body.innerHTML = ` 
        <div style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;font-family:sans-serif">
        <div>
        🤖<br><br>
        А шлях би його трапив!<br>
        Схоже, моє меню на телефоні не працює.<br>
        Краще відкрий мене з комп'ютера 💻
        </div>
        </div>
        `;
        throw new Error("Mobile blocked")
    }

    /* TELEGRAM */
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe.user;
    if (user) {
        document.getElementById("username").textContent = user.first_name;
    }

    // Ініціалізація змінних з localStorage
    let userStatus = localStorage.getItem("userStatus") || "not_work";
    let statusTime = localStorage.getItem("statusTime") ? parseInt(localStorage.getItem("statusTime")) : null;
    let lastAction = localStorage.getItem("lastAction") || "";
    let lastActionTime = localStorage.getItem("lastActionTime") || "";
    let coffeeUsed = parseInt(localStorage.getItem("coffeeUsed") || "0");
    let lunchUsed = parseInt(localStorage.getItem("lunchUsed") || "0");
    let workStartTime = localStorage.getItem("workStartTime") ? parseInt(localStorage.getItem("workStartTime")) : null;

    // Функція для перевірки чи активні кнопки початку роботи (пройшло 22 години)
    function canStartWork() {
        if (!workStartTime) return true;
        const now = Date.now();
        const hoursPassed = (now - workStartTime) / (1000 * 60 * 60);
        return hoursPassed >= 22;
    }

    // Функція для перевірки чи можна робити перерву за часом (київський час)
    function isBreakTimeAllowed() {
        const now = new Date();
        const kyivTime = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Kiev"}));
        const hour = kyivTime.getHours();
        const minutes = kyivTime.getMinutes();
        const currentMinutes = hour * 60 + minutes;
        
        const breakStart = 11 * 60; // 11:00
        const breakEnd = 17 * 60; // 17:00
        
        // Перерви дозволені тільки з 11:00 до 17:00
        return currentMinutes >= breakStart && currentMinutes < breakEnd;
    }

    // Функція для створення HTML кнопки
    function createButton(id, icon, title, subtitle, disabled = false) {
        const card = document.createElement('div');
        card.className = `card ${disabled ? 'disabled' : ''}`;
        card.id = id;
        card.innerHTML = `
            <div class="icon">${icon}</div>
            <div class="text">
                <div class="title">${title}</div>
                <div class="subtitle">${subtitle}</div>
            </div>
        `;
        return card;
    }

    // Функція для оновлення меню
    function updateMenu() {
        const menuContainer = document.getElementById("menuContainer");
        menuContainer.innerHTML = ''; // Очищаємо меню

        const canStart = canStartWork();

        if (userStatus === "not_work" || userStatus === "work_end") {
            // Початковий статус або після виходу - показуємо тільки кнопки початку роботи
            if (userStatus === "work_end" && !canStart) {
                // Якщо не пройшло 22 години - не показуємо кнопок
                // Можна показати повідомлення про очікування
                const messageCard = document.createElement('div');
                messageCard.className = 'card disabled';
                messageCard.innerHTML = `
                    <div class="icon">⏳</div>
                    <div class="text">
                        <div class="title">Очікування</div>
                        <div class="subtitle">Кнопки стануть активними через 22 години</div>
                    </div>
                `;
                menuContainer.appendChild(messageCard);
            } else {
                // Показуємо обидві кнопки початку роботи
                menuContainer.appendChild(createButton('btn_work_start', '🏢', 'Прихід на роботу', 'Початок робочого дня в офісі'));
                menuContainer.appendChild(createButton('btn_online_start', '💻', 'Працюю онлайн', 'Початок віддаленої роботи'));
            }
        } else if (userStatus === "work_start" || userStatus === "online_start") {
            // Статус роботи - показуємо кнопки для перерв та виходу
            menuContainer.appendChild(createButton('btn_coffee_start', '☕', 'Кава брейк', 'Початок (15 хв)', coffeeUsed >= 45));
            menuContainer.appendChild(createButton('btn_lunch_start', '🍽', 'Обід', 'Початок (60 хв)', lunchUsed >= 60));
            menuContainer.appendChild(createButton('btn_work_end', '🏠', 'Вихід з офісу', 'Завершення робочого дня'));
        } else if (userStatus === "coffee_start") {
            // Статус кави - показуємо тільки кнопку завершення кави
            menuContainer.appendChild(createButton('btn_coffee_end', '✅', 'Кінець кави', 'Завершення перерви'));
        } else if (userStatus === "lunch_start") {
            // Статус обіду - показуємо тільки кнопку завершення обіду
            menuContainer.appendChild(createButton('btn_lunch_end', '✅', 'Кінець обіду', 'Завершення перерви'));
        }

        // Додаємо обробники подій для нових кнопок
        addEventListeners();
        updateStatusText();
    }

    // Функція для додавання обробників подій
    function addEventListeners() {
        document.getElementById("btn_work_start")?.addEventListener("click", () => action("work_start"));
        document.getElementById("btn_online_start")?.addEventListener("click", () => action("online_start"));
        document.getElementById("btn_coffee_start")?.addEventListener("click", () => action("coffee_start"));
        document.getElementById("btn_coffee_end")?.addEventListener("click", () => action("coffee_end"));
        document.getElementById("btn_lunch_start")?.addEventListener("click", () => action("lunch_start"));
        document.getElementById("btn_lunch_end")?.addEventListener("click", () => action("lunch_end"));
        document.getElementById("btn_work_end")?.addEventListener("click", () => action("work_end"));
    }

    // Функція для оновлення тексту статусу
    function updateStatusText() {
        const statusText = document.getElementById("statusText");
        const lastActionEl = document.getElementById("lastAction");
        
        const statusMap = {
            "not_work": "⚪ Ви ще не на роботі",
            "work_start": "🟢 Ви на роботі (офіс)",
            "online_start": "🟢 Ви на роботі (онлайн)",
            "coffee_start": "☕ Ви на каві",
            "lunch_start": "🍽 Ви на обіді",
            "work_end": "🔴 Робочий день завершено"
        };
        
        statusText.textContent = statusMap[userStatus] || "⚪ Ви ще не на роботі";
        
        if (lastAction && lastActionTime) {
            lastActionEl.textContent = `Остання дія: ${lastAction} о ${lastActionTime}`;
        } else {
            lastActionEl.textContent = "Остання дія: —";
        }
    }

    // Функція для збереження стану
    function saveState() {
        localStorage.setItem("userStatus", userStatus);
        if (statusTime) localStorage.setItem("statusTime", statusTime);
        localStorage.setItem("lastAction", lastAction);
        localStorage.setItem("lastActionTime", lastActionTime);
        localStorage.setItem("coffeeUsed", coffeeUsed);
        localStorage.setItem("lunchUsed", lunchUsed);
        if (workStartTime) localStorage.setItem("workStartTime", workStartTime);
    }

    // Функція для показу успішного повідомлення
    function showSuccess() {
        const box = document.getElementById("successBox");
        box.classList.add("show");
        setTimeout(() => {
            box.classList.remove("show");
        }, 1200);
    }

    // Основна функція обробки дій
    function action(type) {
        const now = new Date();
        const kyivTime = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Kiev"}));
        const hour = kyivTime.getHours();
        const minutes = kyivTime.getMinutes();
        const timeString = hour + ":" + (minutes < 10 ? "0" + minutes : minutes);
        
        const actions = {
            work_start: "Прихід на роботу",
            online_start: "Працюю онлайн",
            coffee_start: "Початок кави",
            coffee_end: "Кінець кави",
            lunch_start: "Початок обіду",
            lunch_end: "Кінець обіду",
            work_end: "Вихід з офісу"
        };

        // Перевірки для початку роботи
        if (type === "work_start" || type === "online_start") {
            if (!canStartWork()) {
                tg.showPopup({
                    title: "⛔ Зачекайте",
                    message: "Кнопки стануть активними через 22 години після останнього виходу.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }
            
            userStatus = type === "work_start" ? "work_start" : "online_start";
            statusTime = Date.now();
            workStartTime = Date.now();
            lastAction = actions[type];
            lastActionTime = timeString;
            
            tg.HapticFeedback.impactOccurred("medium");
            showSuccess();
            saveState();
            updateMenu();
            return;
        }

        // Перевірки для перерв
        if (type === "coffee_start" || type === "lunch_start") {
            // Перевірка часу
            if (!isBreakTimeAllowed()) {
                tg.showPopup({
                    title: "⛔ Перерва недоступна",
                    message: "Перерва недоступна в цей час.",
                    buttons: [{ type: "ok" }]
                });
                return;
            }

            if (type === "coffee_start") {
                if (coffeeUsed >= 45) {
                    tg.showPopup({
                        title: "⛔ Ліміт вичерпано",
                        message: "Ви вже використали час на Кава брейк (45 хв).",
                        buttons: [{ type: "ok" }]
                    });
                    return;
                }
                userStatus = "coffee_start";
                coffeeUsed += 15;
            } else if (type === "lunch_start") {
                if (lunchUsed >= 60) {
                    tg.showPopup({
                        title: "⛔ Ліміт вичерпано",
                        message: "Ви вже використали час на Обід (60 хв).",
                        buttons: [{ type: "ok" }]
                    });
                    return;
                }
                userStatus = "lunch_start";
                lunchUsed += 60;
            }
            
            statusTime = Date.now();
            lastAction = actions[type];
            lastActionTime = timeString;
            
            tg.HapticFeedback.impactOccurred("medium");
            showSuccess();
            saveState();
            updateMenu();
            return;
        }

        // Завершення перерв
        if (type === "coffee_end") {
            userStatus = "work_start";
            statusTime = Date.now();
            lastAction = actions[type];
            lastActionTime = timeString;
            
            tg.HapticFeedback.impactOccurred("medium");
            showSuccess();
            saveState();
            updateMenu();
            return;
        }

        if (type === "lunch_end") {
            userStatus = "work_start";
            statusTime = Date.now();
            lastAction = actions[type];
            lastActionTime = timeString;
            
            tg.HapticFeedback.impactOccurred("medium");
            showSuccess();
            saveState();
            updateMenu();
            return;
        }

        // Вихід з офісу
        if (type === "work_end") {
            userStatus = "work_end";
            statusTime = Date.now();
            lastAction = actions[type];
            lastActionTime = timeString;
            
            tg.HapticFeedback.impactOccurred("medium");
            showSuccess();
            saveState();
            updateMenu();
            return;
        }
    }

    // Ініціалізація при завантаженні
    window.onload = () => {
        updateMenu();
    };

    // Періодична перевірка для оновлення кнопок
    setInterval(updateMenu, 60000); // Перевіряємо кожну хвилину

</script>
</body>
</html>
