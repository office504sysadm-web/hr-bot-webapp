<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Bot Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 16px;
            color: #8e8e93;
        }
        
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .menu-item {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .menu-item:hover {
            background: #f8f8f8;
        }
        
        .menu-item:active {
            transform: scale(0.98);
        }
        
        .menu-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .menu-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .menu-item-text {
            flex: 1;
        }
        
        .menu-item-title {
            font-size: 16px;
            font-weight: 500;
            color: #1c1c1e;
            margin-bottom: 2px;
        }
        
        .menu-item-subtitle {
            font-size: 13px;
            color: #8e8e93;
        }
        
        .menu-item-right {
            color: #8e8e93;
            font-size: 20px;
        }
        
        /* Мобільне блокування */
        .blocked-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        
        .blocked-screen .emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .blocked-screen h2 {
            font-size: 24px;
            color: #1c1c1e;
            margin-bottom: 12px;
        }
        
        .blocked-screen p {
            font-size: 16px;
            color: #8e8e93;
            margin-bottom: 30px;
        }
        
        .blocked-screen .platform-info {
            background: #f2f2f7;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>HR Bot</h1>
            <p>Відмітки робочого часу</p>
        </div>
        
        <div class="menu-grid" id="menuGrid">
            <!-- Прихід на роботу -->
            <div class="menu-item" data-action="work_start">
                <div class="menu-item-content">
                    <div class="menu-item-icon">🏢</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Прихід на роботу</div>
                        <div class="menu-item-subtitle">Початок робочого дня</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
            
            <!-- Кава брейк -->
            <div class="menu-item" data-action="coffee_start">
                <div class="menu-item-content">
                    <div class="menu-item-icon" style="background: #fff3e0; color: #f57c00;">☕️</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Кава брейк</div>
                        <div class="menu-item-subtitle">Початок</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
            
            <!-- Кінець кави -->
            <div class="menu-item" data-action="coffee_end">
                <div class="menu-item-content">
                    <div class="menu-item-icon" style="background: #fce4ec; color: #c2185b;">✅</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Кінець кави</div>
                        <div class="menu-item-subtitle">Завершення</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
            
            <!-- Обід -->
            <div class="menu-item" data-action="lunch_start">
                <div class="menu-item-content">
                    <div class="menu-item-icon" style="background: #e8f5e8; color: #388e3c;">🍽</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Обід</div>
                        <div class="menu-item-subtitle">Початок</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
            
            <!-- Кінець обіду -->
            <div class="menu-item" data-action="lunch_end">
                <div class="menu-item-content">
                    <div class="menu-item-icon" style="background: #fce4ec; color: #c2185b;">✅</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Кінець обіду</div>
                        <div class="menu-item-subtitle">Завершення</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
            
            <!-- Відхід з офісу -->
            <div class="menu-item" data-action="work_end">
                <div class="menu-item-content">
                    <div class="menu-item-icon" style="background: #e3f2fd; color: #1976d2;">🏠</div>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Відхід з офісу</div>
                        <div class="menu-item-subtitle">Завершення робочого дня</div>
                    </div>
                    <div class="menu-item-right">›</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="blocked-screen" id="blockedScreen">
        <div class="emoji">⛔️</div>
        <h2>Доступ заборонено</h2>
        <p>Цей бот працює тільки з комп'ютера</p>
        <div class="platform-info" id="platformInfo"></div>
    </div>

    <script>
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        const platform = navigator.platform;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        return { isMobile, deviceType: isMobile ? 'mobile' : 'desktop' };
    }

    const device = getDeviceInfo();
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Додаємо обробник на всі кнопки
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            const action = this.dataset.action;
            const data = {
                action: action,
                timestamp: new Date().toISOString(),
                device: device.deviceType,
                test: true
            };
            
            console.log('Sending:', data);
            
            // Показуємо сповіщення що кнопка натиснута
            alert(`Натиснуто: ${action}\nДані відправлено в бота`);
            
            // Відправляємо в бота
            tg.sendData(JSON.stringify(data));
        });
    });
</script>
</body>
</html>
