<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HR Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div style="padding: 20px; font-family: Arial;">
        <h2>HR Bot Menu</h2>
        
        <button onclick="sendAction('work_start')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            🏢 Прихід на роботу
        </button>
        
        <button onclick="sendAction('coffee_start')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            ☕ Кава брейк
        </button>
        
        <button onclick="sendAction('coffee_end')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            ✅ Кінець кави
        </button>
        
        <button onclick="sendAction('lunch_start')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            🍽 Обід
        </button>
        
        <button onclick="sendAction('lunch_end')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            ✅ Кінець обіду
        </button>
        
        <button onclick="sendAction('work_end')" style="display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px;">
            🏠 Відхід з офісу
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function sendAction(action) {
            const data = {
                action: action,
                timestamp: new Date().toISOString()
            };
            
            console.log('Sending:', data);
            tg.sendData(JSON.stringify(data));
            
            alert('Дані відправлено!');
        }
    </script>
</body>
</html>
