<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка пристрою</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin: 0 0 20px;
            font-size: 24px;
        }
        p {
            margin: 10px 0;
            opacity: 0.9;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }
        .debug-info {
            font-size: 12px;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Перевірка пристрою</h1>
        <div class="loader"></div>
        <p>Визначаємо вашу платформу...</p>
        <div class="debug-info" id="debug"></div>
    </div>

    <script>
        // Функція для відображення debug інформації на сторінці
        function showDebug(message) {
            const debugEl = document.getElementById('debug');
            debugEl.style.display = 'block';
            debugEl.innerHTML += message + '<br>';
            console.log(message);
        }

        try {
            console.log("=== WebApp Started ===");
            showDebug("WebApp started");
            
            // Перевіряємо чи доступний Telegram WebApp API
            if (!window.Telegram || !window.Telegram.WebApp) {
                throw new Error("Telegram WebApp API not available");
            }
            
            const tg = window.Telegram.WebApp;
            console.log("Telegram WebApp API:", tg);
            showDebug("Telegram API loaded");
            
            // Розгортаємо на весь екран
            tg.expand();
            console.log("WebApp expanded");
            showDebug("WebApp expanded");
            
            // Визначаємо платформу через Telegram API
            const platform = tg.platform;
            console.log("Platform:", platform);
            showDebug("Platform: " + platform);
            
            // Визначаємо чи це мобільний пристрій
            const isMobile = platform.includes('android') || platform.includes('ios');
            console.log("Is Mobile:", isMobile);
            showDebug("Is Mobile: " + isMobile);
            
            // Отримуємо додаткову інформацію через userAgent
            const userAgent = navigator.userAgent;
            console.log("User Agent:", userAgent);
            showDebug("User Agent: " + userAgent.substring(0, 50) + "...");
            
            // Детектимо конкретний браузер/ОС
            let os = 'unknown';
            let browser = 'unknown';
            
            if (userAgent.includes('Windows')) os = 'Windows';
            else if (userAgent.includes('Mac')) os = 'macOS';
            else if (userAgent.includes('Linux')) os = 'Linux';
            else if (userAgent.includes('Android')) os = 'Android';
            else if (userAgent.includes('iPhone') || userAgent.includes('iPad')) os = 'iOS';
            
            if (userAgent.includes('Chrome')) browser = 'Chrome';
            else if (userAgent.includes('Firefox')) browser = 'Firefox';
            else if (userAgent.includes('Safari')) browser = 'Safari';
            else if (userAgent.includes('Edge')) browser = 'Edge';
            
            showDebug("OS: " + os);
            showDebug("Browser: " + browser);
            
            // Формуємо дані для відправки
            const deviceInfo = {
                platform: platform,
                isMobile: isMobile,
                os: os,
                browser: browser,
                userAgent: userAgent,
                timestamp: new Date().toISOString()
            };
            
            console.log("Device Info:", deviceInfo);
            showDebug("Data prepared: " + JSON.stringify(deviceInfo).substring(0, 50) + "...");
            
            // Відправляємо дані боту
            console.log("Sending data to bot...");
            showDebug("Sending data to bot...");
            
            tg.sendData(JSON.stringify(deviceInfo));
            
            console.log("Data sent successfully!");
            showDebug("✓ Data sent successfully!");
            
            // Змінюємо повідомлення на успішне
            document.querySelector('h1').innerHTML = '✅ Перевірка завершена';
            document.querySelector('p').innerHTML = 'Дані відправлено боту. Ви можете закрити це вікно.';
            document.querySelector('.loader').style.display = 'none';
            
            // Автоматично закриваємо через 2 секунди
            setTimeout(() => {
                console.log("Closing WebApp");
                showDebug("Closing WebApp...");
                tg.close();
            }, 2000);
            
        } catch (error) {
            console.error("!!! WebApp Error !!!", error);
            
            // Показуємо помилку на сторінці
            document.querySelector('h1').innerHTML = '❌ Помилка';
            document.querySelector('p').innerHTML = 'Помилка: ' + error.message;
            document.querySelector('.loader').style.display = 'none';
            
            showDebug("❌ ERROR: " + error.message);
            
            // Все одно відправляємо дані, якщо можемо
            try {
                const tg = window.Telegram.WebApp;
                tg.sendData(JSON.stringify({
                    error: error.message,
                    userAgent: navigator.userAgent
                }));
                showDebug("Error data sent to bot");
            } catch (e) {
                console.error("Could not send error data:", e);
                showDebug("Failed to send error data");
            }
        }
    </script>
</body>
</html>
