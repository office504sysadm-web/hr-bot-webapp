<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorkBuddy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Roboto;
margin:0;
background:linear-gradient(180deg,#6a7cff,#7b61ff,#8c6cff);
color:white;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:25px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:white;
margin:auto;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:#333;
}

.status-box{
background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);
border-radius:18px;
padding:14px;
margin-bottom:20px;
text-align:center;
}

.status{
font-size:18px;
font-weight:600;
}

.last-action{
font-size:13px;
opacity:.8;
margin-top:4px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.card{

background:rgba(255,255,255,.92);
border-radius:20px;
padding:16px;

display:flex;
align-items:center;
gap:14px;

cursor:pointer;
transition:.18s;

box-shadow:
0 10px 25px rgba(0,0,0,.2);

}

.card:active{
transform:scale(.95);
}

.icon{
width:42px;
height:42px;
border-radius:12px;
background:#f2f2f7;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.text{
flex:1;
}

.title{
color:#1c1c1e;
font-weight:600;
}

.subtitle{
color:#6e6e73;
font-size:13px;
}

.success{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);

background:white;
color:#333;

padding:25px 30px;
border-radius:20px;

font-size:22px;
font-weight:600;

box-shadow:0 20px 40px rgba(0,0,0,.3);

transition:.3s;

}

.success.show{
transform:translate(-50%,-50%) scale(1);
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
opacity:.7;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="avatar" id="avatar">🤖</div>

<h2 id="username">WorkBuddy</h2>

</div>

<div class="status-box">

<div class="status" id="statusText">
Не на роботі
</div>

<div class="last-action" id="lastAction">
Остання дія: —
</div>

</div>

<div class="menu">

<div class="card" onclick="action('work_start')">
<div class="icon">🏢</div>
<div class="text">
<div class="title">Прихід на роботу</div>
<div class="subtitle">Початок робочого дня</div>
</div>
</div>

<div class="card" onclick="action('coffee_start')">
<div class="icon">☕</div>
<div class="text">
<div class="title">Кава брейк</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" onclick="action('coffee_end')">
<div class="icon">✅</div>
<div class="text">
<div class="title">Кінець кави</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" onclick="action('lunch_start')">
<div class="icon">🍽</div>
<div class="text">
<div class="title">Обід</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" onclick="action('lunch_end')">
<div class="icon">✅</div>
<div class="text">
<div class="title">Кінець обіду</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" onclick="action('work_end')">
<div class="icon">🏠</div>
<div class="text">
<div class="title">Вихід з офісу</div>
<div class="subtitle">Завершення робочого дня</div>
</div>
</div>

</div>

<div class="footer">
@friendly_company_hr_bot
</div>

</div>

<div class="success" id="successBox">
✅ Збережено
</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("username").innerText =
user.first_name;

if(user.photo_url){

document.getElementById("avatar").innerHTML =
`<img src="${user.photo_url}" style="width:70px;height:70px;border-radius:50%">`;

}

}

function action(type){

const time=new Date().toLocaleTimeString();

let status="";

if(type==="work_start") status="Ви на роботі";
if(type==="coffee_start") status="Кава брейк";
if(type==="coffee_end") status="Ви на роботі";
if(type==="lunch_start") status="Обід";
if(type==="lunch_end") status="Ви на роботі";
if(type==="work_end") status="Робочий день завершено";

document.getElementById("statusText").innerText=status;

document.getElementById("lastAction").innerText=
"Остання дія: "+time;

tg.HapticFeedback.impactOccurred("medium");

tg.sendData(JSON.stringify({
action:type,
time:new Date().toISOString()
}));

showSuccess();

}

function showSuccess(){

const box=document.getElementById("successBox");

box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},1200);

}

</script>

</body>
</html>
