<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>WorkBuddy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;

font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Roboto;

background:linear-gradient(180deg,#6a7cff,#7b61ff,#8c6cff);

color:white;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:18px;
}

.header{
text-align:center;
margin-bottom:10px;
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:white;
margin:auto;
margin-bottom:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:#333;
}

h2{
font-size:22px;
margin:4px 0;
}

.status-box{
background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);
border-radius:16px;
padding:10px;
margin-bottom:12px;
text-align:center;
}

.status{
font-size:16px;
font-weight:600;
}

.last-action{
font-size:12px;
opacity:.8;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.card{
background:rgba(255,255,255,.92);
border-radius:18px;
padding:10px 14px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
transition:.15s;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.card:active{
transform:scale(.96);
}

.icon{
width:34px;
height:34px;
border-radius:10px;
background:#f2f2f7;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.text{flex:1;}

.title{
color:#1c1c1e;
font-weight:600;
font-size:14px;
}

.subtitle{
color:#6e6e73;
font-size:11px;
}

.success{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#333;
padding:20px 25px;
border-radius:16px;
font-size:18px;
font-weight:600;
box-shadow:0 20px 40px rgba(0,0,0,.3);
transition:.3s;
}

.success.show{
transform:translate(-50%,-50%) scale(1);
}

.footer{
margin-top:4px;
text-align:center;
font-size:10px;
opacity:.5;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="avatar" id="avatar">🤖</div>

<h2 id="username">WorkBuddy</h2>

</div>

<div class="status-box">

<div class="status" id="statusText">
⚪ Не на роботі
</div>

<div class="last-action" id="lastAction">
Остання дія: —
</div>

</div>

<div class="menu">

<div class="card" onclick="action('work_start')">
<div class="icon">🏢</div>
<div class="text">
<div class="title">Прихід на роботу</div>
<div class="subtitle">Початок робочого дня</div>
</div>
</div>

<div class="card" onclick="action('coffee_start')">
<div class="icon">☕</div>
<div class="text">
<div class="title">Кава брейк</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" onclick="action('coffee_end')">
<div class="icon">✅</div>
<div class="text">
<div class="title">Кінець кави</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" onclick="action('lunch_start')">
<div class="icon">🍽</div>
<div class="text">
<div class="title">Обід</div>
<div class="subtitle">Початок</div>
</div>
</div>

<div class="card" onclick="action('lunch_end')">
<div class="icon">✅</div>
<div class="text">
<div class="title">Кінець обіду</div>
<div class="subtitle">Завершення</div>
</div>
</div>

<div class="card" onclick="action('work_end')">
<div class="icon">🏠</div>
<div class="text">
<div class="title">Вихід з офісу</div>
<div class="subtitle">Завершення робочого дня</div>
</div>
</div>

</div>

</div>

<div class="success" id="successBox">
✅ Збережено
</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();
tg.disableVerticalSwipes();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("username").innerText =
user.first_name;

if(user.photo_url){

document.getElementById("avatar").innerHTML =
`<img src="${user.photo_url}" style="width:55px;height:55px;border-radius:50%">`;

}

}

/* перевірка дозволу перерв */

function isBreakAllowed(type){

if(type !== "coffee_start" && type !== "lunch_start"){
return true;
}

const now = new Date();

const hour = now.getHours();
const minutes = now.getMinutes();

const current = hour * 60 + minutes;

const morningStart = 10 * 60;
const morningEnd = 11 * 60;

const eveningStart = 17 * 60;
const eveningEnd = 19 * 60;

if(
(current >= morningStart && current < morningEnd) ||
(current >= eveningStart && current < eveningEnd)
){
return false;
}

return true;

}

function action(type){

if(!isBreakAllowed(type)){

tg.showPopup({
title:"⛔ Перерва недоступна",
message:"У першу та останню робочу годину не можна брати каву або обід.",
buttons:[{type:"ok"}]
});

return;

}

const time = new Date().toLocaleTimeString();

const actions = {

work_start:"Прихід на роботу",
coffee_start:"Початок кави",
coffee_end:"Кінець кави",
lunch_start:"Початок обіду",
lunch_end:"Кінець обіду",
work_end:"Вихід з офісу"

};

const statuses = {

work_start:"🟢 На роботі",
coffee_start:"☕ Кава",
coffee_end:"🟢 На роботі",
lunch_start:"🍽 Обід",
lunch_end:"🟢 На роботі",
work_end:"🔴 Робочий день завершено"

};

document.getElementById("statusText").innerText =
statuses[type];

document.getElementById("lastAction").innerText =
"Остання дія: "+actions[type]+" ("+time+")";

tg.HapticFeedback.impactOccurred("medium");

tg.sendData(JSON.stringify({
action:type,
time:new Date().toISOString()
}));

showSuccess();

}

function showSuccess(){

const box=document.getElementById("successBox");

box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},1200);

}

</script>

</body>
</html>
