<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBuddy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 18px;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
            text-align: center;
        }

        .status {
            font-size: 16px;
            font-weight: 600;
        }

        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #9ca3af;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .card:active {
            transform: scale(0.96);
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .text {
            flex: 1;
        }

        .title {
            color: #1c1c1e;
            font-weight: 600;
            font-size: 14px;
        }

        .subtitle {
            color: #6e6e73;
            font-size: 11px;
        }

        .success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 20px 25px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .success.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

<div id="app">
    <div class="container">
        <!-- Статус користувача -->
        <div class="status-box">
            <div class="status-dot" id="statusDot"></div>
            <div class="status" id="statusText">⚪ Ви ще не на роботі</div>
        </div>

        <!-- Кнопки меню -->
        <div class="menu">
            <div class="card" id="btn_work_start">
                <div class="icon">🏢</div>
                <div class="text">
                    <div class="title">Прихід на роботу</div>
                    <div class="subtitle">Початок робочого дня</div>
                </div>
            </div>

            <div class="card" id="btn_coffee_start">
                <div class="icon">☕</div>
                <div class="text">
                    <div class="title">Кава брейк</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>

            <div class="card" id="btn_coffee_end">
                <div class="icon">✅</div>
                <div class="text">
                    <div class="title">Кінець кави</div>
                    <div class="subtitle">Завершення</div>
                </div>
            </div>

            <div class="card" id="btn_lunch_start">
                <div class="icon">🍽</div>
                <div class="text">
                    <div class="title">Обід</div>
                    <div class="subtitle">Початок</div>
                </div>
            </div>

            <div class="card" id="btn_lunch_end">
                <div class="icon">✅</div>
                <div class="text">
                    <div class="title">Кінець обіду</div>
                    <div class="subtitle">Завершення</div>
                </div>
            </div>

            <div class="card" id="btn_work_end">
                <div class="icon">🏠</div>
                <div class="text">
                    <div class="title">Вихід з офісу</div>
                    <div class="subtitle">Завершення робочого дня</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="success" id="successBox">
    ✅ Збережено
</div>

<script>
    // 1. Функція для оновлення статусу
    function updateStatus(action) {
        const statusText = document.getElementById("statusText");
        const statusDot = document.getElementById("statusDot");

        if (action === "work_start") {
            statusText.innerText = "🟢 Ви на роботі";
            statusDot.style.background = "#22c55e";
        }

        if (action === "coffee_start") {
            statusText.innerText = "☕ Ви на каві";
            statusDot.style.background = "#f59e0b";
        }

        if (action === "lunch_start") {
            statusText.innerText = "🍽 Ви на обіді";
            statusDot.style.background = "#f59e0b";
        }

        if (action === "work_end") {
            statusText.innerText = "🔴 Ви не на роботі";
            statusDot.style.background = "#9ca3af";
        }
    }

    // 2. Функція для відправлення даних та оновлення статусу
    function sendAction(action) {
        const data = {
            action: action,
            time: new Date().toISOString()
        };

        tg.sendData(JSON.stringify(data));

        // ОНОВЛЮЄМО СТАТУС
        updateStatus(action);
    }

    // 3. Додаємо слухачі для кнопок
    document.getElementById("btn_work_start").addEventListener("click", () => sendAction("work_start"));
    document.getElementById("btn_coffee_start").addEventListener("click", () => sendAction("coffee_start"));
    document.getElementById("btn_coffee_end").addEventListener("click", () => sendAction("coffee_end"));
    document.getElementById("btn_lunch_start").addEventListener("click", () => sendAction("lunch_start"));
    document.getElementById("btn_lunch_end").addEventListener("click", () => sendAction("lunch_end"));
    document.getElementById("btn_work_end").addEventListener("click", () => sendAction("work_end"));

    // 4. Ініціалізація Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
</script>

</body>
</html>
