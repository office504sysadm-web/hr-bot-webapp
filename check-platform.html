<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkBuddy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-start: #5f6cff;
      --bg-mid: #7b61ff;
      --bg-end: #9b70ff;
      --card-bg: rgba(255, 255, 255, 0.18);
      --card-stroke: rgba(255, 255, 255, 0.22);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.82);
      --panel-bg: rgba(255, 255, 255, 0.93);
      --panel-text: #111827;
      --panel-sub: #6b7280;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
      --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top-card {
      background: var(--card-bg);
      border: 1px solid var(--card-stroke);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 30px;
      padding: 20px 18px 18px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.94);
      color: #5f6cff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: var(--shadow-soft);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 25px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .header-text .subline {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .status-box {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 16px 15px;
      margin-bottom: 14px;
    }

    .status-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.76);
      margin-bottom: 8px;
    }

    .status-main {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .status-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .meta-card {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 20px;
      padding: 14px 12px;
    }

    .meta-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.76);
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 15px;
      font-weight: 600;
    }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action-btn {
      width: 100%;
      border: 0;
      outline: none;
      background: var(--panel-bg);
      color: var(--panel-text);
      border-radius: var(--radius-xl);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      text-align: left;
    }

    .action-btn:active {
      transform: scale(0.985);
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .action-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 6px 16px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .action-text {
      flex: 1;
      min-width: 0;
    }

    .action-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 3px;
    }

    .action-subtitle {
      font-size: 12px;
      color: var(--panel-sub);
      line-height: 1.35;
    }

    .message-box {
      display: none;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.45;
      color: #fff;
      box-shadow: var(--shadow-soft);
    }

    .message-box.show {
      display: block;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 0 8px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: rgba(255,255,255,.88);
    }

    .success {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(30px);
      background: rgba(255, 255, 255, 0.96);
      color: #111827;
      padding: 14px 18px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      font-size: 15px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.22s ease;
      z-index: 999;
    }

    .success.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <div class="top-card">
        <div class="header">
          <div class="avatar">🤖</div>
          <div class="header-text">
            <h1 id="headerName">WorkBuddy</h1>
            <div class="subline" id="headerSubline">Завантаження профілю…</div>
          </div>
        </div>

        <div class="status-box">
          <div class="status-label">Поточний статус</div>
          <div class="status-main" id="statusMain">⏳ Завантаження…</div>
          <div class="status-sub" id="statusSub">Почекай кілька секунд, я перевіряю доступ і меню.</div>
        </div>

        <div class="meta-grid">
          <div class="meta-card">
            <div class="meta-title">Роль</div>
            <div class="meta-value" id="roleValue">—</div>
          </div>
          <div class="meta-card">
            <div class="meta-title">IP / сервер</div>
            <div class="meta-value" id="ipValue">—</div>
          </div>
        </div>
      </div>

      <div class="message-box" id="messageBox"></div>

      <div class="menu-wrap" id="menuWrap"></div>

      <div class="loader" id="loader">Перевіряю доступ до системи…</div>

      <div class="pill hidden" id="debugPill">DEBUG</div>
    </div>
  </div>

  <div class="success" id="successBox">✅ Дію збережено</div>

  <script>
    const API_URL = "https://reptilelike-elnora-nonabjuratory.ngrok-free.dev";
    console.log("WEBAPP VERSION 20260314-1805");

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user || null;

    const el = {
      headerName: document.getElementById("headerName"),
      headerSubline: document.getElementById("headerSubline"),
      statusMain: document.getElementById("statusMain"),
      statusSub: document.getElementById("statusSub"),
      roleValue: document.getElementById("roleValue"),
      ipValue: document.getElementById("ipValue"),
      menuWrap: document.getElementById("menuWrap"),
      loader: document.getElementById("loader"),
      messageBox: document.getElementById("messageBox"),
      successBox: document.getElementById("successBox"),
      debugPill: document.getElementById("debugPill"),
    };

    const ACTION_META = {
      start_office: {
        icon: "🏢",
        title: "Працюю в офісі",
        subtitle: "Початок робочого дня в офісі"
      },
      start_remote: {
        icon: "🏠",
        title: "Працюю онлайн",
        subtitle: "Початок віддаленої роботи"
      },
      coffee: {
        icon: "☕",
        title: "Кава",
        subtitle: "Початок кава-брейку"
      },
      coffee_end: {
        icon: "✅",
        title: "Кінець кави",
        subtitle: "Повернення до роботи"
      },
      lunch: {
        icon: "🍽️",
        title: "Обід",
        subtitle: "Початок обіду"
      },
      lunch_end: {
        icon: "✅",
        title: "Кінець обіду",
        subtitle: "Повернення до роботи"
      },
      finish: {
        icon: "🏁",
        title: "Кінець роботи",
        subtitle: "Завершення робочого дня"
      }
    };

    let currentUser = null;
    let accessInfo = null;

    function blockMobile() {
      if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.body.innerHTML = `
          <div style="
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            color:white;
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
            background:linear-gradient(145deg, #5f6cff 0%, #7b61ff 50%, #9b70ff 100%);
            padding:24px;
          ">
            <div style="
              max-width:380px;
              background:rgba(255,255,255,.16);
              border:1px solid rgba(255,255,255,.20);
              border-radius:28px;
              padding:28px 22px;
              backdrop-filter:blur(16px);
            ">
              <div style="font-size:38px;margin-bottom:14px;">💻</div>
              <div style="font-size:22px;font-weight:700;margin-bottom:10px;">Керування недоступне</div>
              <div style="font-size:15px;line-height:1.5;opacity:.92;">
                Робоче меню доступне тільки з комп’ютера через робочий сервер.
              </div>
            </div>
          </div>
        `;
        throw new Error("Mobile blocked");
      }
    }

    function showLoader(text = "Завантаження…") {
      el.loader.textContent = text;
      el.loader.classList.remove("hidden");
    }

    function hideLoader() {
      el.loader.classList.add("hidden");
    }

    function showMessage(text) {
      el.messageBox.textContent = text;
      el.messageBox.classList.add("show");
    }

    function hideMessage() {
      el.messageBox.textContent = "";
      el.messageBox.classList.remove("show");
    }

    function showSuccess(text = "✅ Дію збережено") {
      el.successBox.textContent = text;
      el.successBox.classList.add("show");
      setTimeout(() => {
        el.successBox.classList.remove("show");
      }, 1300);
    }

    function setStatus(main, sub = "") {
      el.statusMain.textContent = main;
      el.statusSub.textContent = sub;
    }

    function mapRole(role) {
      if (role === "hr") return "HR";
      if (role === "finance") return "Finance";
      if (role === "sysadmin") return "SysAdmin";
      return role || "—";
    }

    function renderHeader() {
      if (!currentUser) {
        el.headerName.textContent = "WorkBuddy";
        el.headerSubline.textContent = "Telegram user не знайдено";
        return;
      }

      const fullName = [currentUser.first_name, currentUser.last_name].filter(Boolean).join(" ").trim();
      el.headerName.textContent = currentUser.first_name || "WorkBuddy";
      el.headerSubline.textContent = fullName || "Працівник";
    }

    function createActionButton(actionId) {
      const meta = ACTION_META[actionId] || {
        icon: "✨",
        title: actionId,
        subtitle: "Дія"
      };

      const btn = document.createElement("button");
      btn.className = "action-btn";
      btn.type = "button";

      btn.innerHTML = `
        <div class="action-icon">${meta.icon}</div>
        <div class="action-text">
          <div class="action-title">${meta.title}</div>
          <div class="action-subtitle">${meta.subtitle}</div>
        </div>
      `;

      btn.addEventListener("click", async () => {
        await handleAction(actionId, btn);
      });

      return btn;
    }

    function renderMenu(menuItems = []) {
      el.menuWrap.innerHTML = "";

      if (!Array.isArray(menuItems) || menuItems.length === 0) {
        showMessage("Зараз у тебе немає доступних дій.");
        return;
      }

      hideMessage();

      menuItems.forEach((item) => {
        const actionId = item.id;
        const btn = createActionButton(actionId);
        el.menuWrap.appendChild(btn);
      });
    }

    async function apiPost(path, payload) {
      const res = await fetch(`${API_URL}${path}`, {
        method: "POST",
        mode: "cors",
        headers: {
          "Content-Type": "application/json",
          "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      let data = {};
      try {
        data = JSON.parse(text);
      } catch (e) {
        data = { ok: false, message: text || "Некоректна відповідь сервера" };
      }

      return { res, data };
    }

    async function apiGet(path) {
      const res = await fetch(`${API_URL}${path}?telegram_id=${currentUser.id}`, {
        method: "GET",
        mode: "cors",
        headers: {
          "Content-Type": "application/json",
          "ngrok-skip-browser-warning": "true"
        }
      });

      const text = await res.text();
      let data = {};
      try {
        data = JSON.parse(text);
      } catch (e) {
        data = { ok: false, message: text || "Некоректна відповідь сервера" };
      }

      return { res, data };
    }

    async function checkAccess() {
      console.log("AUTH CHECK START", currentUser?.id, API_URL);

      if (!currentUser?.id) {
        setStatus("⛔ Telegram user не знайдено", "Відкрий меню через Telegram.");
        showMessage("Не вдалося отримати дані користувача з Telegram.");
        return false;
      }

      showLoader("Перевіряю доступ до системи…");

      try {
        const { data } = await apiPost("/auth/check", {
          telegram_id: currentUser.id
        });

        console.log("AUTH CHECK RESPONSE", data);

        if (!data.ok) {
          setStatus("⛔ Доступ заблоковано", data.message || "Немає доступу до системи.");
          el.roleValue.textContent = "—";
          el.ipValue.textContent = data.ip || "—";
          showMessage(data.message || "Доступ заборонено.");
          hideLoader();
          return false;
        }

        accessInfo = data;
        el.roleValue.textContent = mapRole(data.role);
        el.ipValue.textContent = data.ip || "—";

        setStatus("✅ Доступ підтверджено", "Можна завантажувати робоче меню.");
        hideLoader();
        return true;
      } catch (err) {
        console.error("AUTH CHECK ERROR", err);
        setStatus("⚠️ Помилка з’єднання", "Не вдалося підключитися до API.");
        showMessage("Помилка з’єднання з сервером. Перевір API або тунель ngrok.");
        hideLoader();
        return false;
      }
    }

    async function loadMenu() {
      showLoader("Завантажую робоче меню…");

      try {
        const { data } = await apiGet("/work/menu");
        console.log("LOAD MENU RESPONSE", data);

        if (!data.ok) {
          setStatus("⚠️ Меню недоступне", data.message || "Не вдалося отримати меню.");
          showMessage(data.message || "Сервер не повернув меню.");
          return;
        }

        renderMenu(data.menu || []);
        setStatus(data.status_text || "🟢 Меню готове", "Обери потрібну дію.");
      } catch (err) {
        console.error("LOAD MENU ERROR", err);
        setStatus("⚠️ Меню недоступне", "Не вдалося отримати меню з API.");
        showMessage("Сервер не повернув меню.");
      } finally {
        hideLoader();
      }
    }

    async function handleAction(actionId, btn) {
      if (!currentUser?.id) return;

      btn.disabled = true;

      try {
        const payload = {
          telegram_id: currentUser.id,
          action: actionId
        };

        const { data } = await apiPost("/work/action", payload);
        console.log("ACTION RESPONSE", data);

        if (!data.ok) {
          showMessage(data.message || "Дію не вдалося виконати.");
          return;
        }

        tg.HapticFeedback?.impactOccurred?.("medium");
        showSuccess(data.message || "✅ Дію збережено");

        if (data.message) {
          setStatus("✅ Дію виконано", data.message);
        }

        if (data.role) {
          el.roleValue.textContent = mapRole(data.role);
        }

        if (data.employee_name) {
          el.headerName.textContent = data.employee_name;
        }

        renderMenu(data.menu || []);
      } catch (err) {
        console.error("ACTION ERROR", err);
        showMessage("Помилка під час виконання дії.");
      } finally {
        btn.disabled = false;
      }
    }

    async function init() {
  blockMobile();

  currentUser = user;
  renderHeader();

  console.log("INIT USER", currentUser);

  if (currentUser) {
    showMessage(`DEBUG: Telegram user = ${currentUser.id}`);
  } else {
    showMessage("DEBUG: Telegram user = null");
  }

  if (!currentUser) {
    setStatus("⛔ Немає даних користувача", "Відкрий це меню тільки з Telegram.");
    hideLoader();
    return;
  }

  const accessOk = await checkAccess();
  if (!accessOk) return;

  await loadMenu();
}
    window.addEventListener("load", init);
  </script>
</body>
</html>
